<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Battle Robot Game</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="game-container">
        <h1>Battle Robot Game</h1>
        <div style="display: flex; gap: 20px;">
            <!-- Left side: Game board -->
            <div style="flex: 1;">
                <div id="controls">
                    <button id="start-button">Start Game</button>
                    <button id="stop-button" disabled>Stop Game</button>
                </div>
                <div id="game-board"></div>
            </div>

            <!-- Right side: Programming interface -->
            <div id="programming-panel" style="flex: 1; display: flex; flex-direction: column;">
                <h2>Robot Programming</h2>

                <!-- Available blocks -->
                <div id="available-blocks-container">
                    <h3>Available Blocks</h3>
                    <div id="available-blocks">
                        <div class="block-button" draggable="true" data-instruction="moveLeft">⬅️ Move Left</div>
                        <div class="block-button" draggable="true" data-instruction="moveRight">➡️ Move Right</div>
                        <div class="block-button" draggable="true" data-instruction="moveUp">⬆️ Move Up</div>
                        <div class="block-button" draggable="true" data-instruction="moveDown">⬇️ Move Down</div>
                    </div>
                </div>

                <!-- Program grid -->
                <div id="program-grid-container">
                    <h3>Robot Memory (4x4)</h3>
                    <div id="program-grid"></div>
                    <button id="clear-program">Clear Program</button>
                </div>
            </div>
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
